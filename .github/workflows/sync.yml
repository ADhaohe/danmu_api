name: Auto Sync Fork

on:
  schedule:
    - cron: '0 0 * * *' # 每天自动运行
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync upstream changes
        uses: wei/pull@v3
        with:
          upstream_repository: 原作者用户名/danmu_api # 【需要修改】改成原作者的名字和仓库名
          upstream_branch: main                  # 【需要修改】原仓库的主分支名（通常是 main 或 master）
          target_branch: main                    # 【需要修改】你自己的主分支名
          github_token: ${{ secrets.GITHUB_TOKEN }}
